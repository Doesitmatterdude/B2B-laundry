services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: freshfold
      POSTGRES_PASSWORD: freshfold
      POSTGRES_DB: freshfold
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freshfold"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    env_file: ../../apps/api/.env
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_started }
    ports: ["3000:3000"]

  nginx:
    image: nginx:1.27-alpine
    volumes: ["../nginx/freshfold.conf:/etc/nginx/conf.d/default.conf:ro"]
    ports: ["80:80", "443:443"]
    depends_on: [api]

volumes:
  pgdata:
