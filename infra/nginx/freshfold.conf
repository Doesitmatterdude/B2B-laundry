# FreshFold reverse proxy (SRS 25.4). Add TLS via certbot in production.
server {
  listen 80;
  server_name _;

  # security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  client_max_body_size 25m;   # photo/evidence uploads
  gzip on;
  gzip_types application/json text/css application/javascript;

  location /api/ {
    proxy_pass http://api:3000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # web (admin/portal) and /app (field PWA) static hosting added at M2/M6.
  location / { return 200 'FreshFold API up. Web build mounts here.'; add_header Content-Type text/plain; }
}
